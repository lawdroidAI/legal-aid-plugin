version: 2
updates:
  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"

  # Python dependencies for the MkDocs documentation build
  # (Add a requirements.txt or pyproject.toml if you want Dependabot to track
  # mkdocs-material versions; currently the workflow installs the latest.)
